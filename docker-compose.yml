version: '3.8'

services:
  # ==================== Database ====================
  db:
    image: postgres:16-alpine
    container_name: proto-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: proto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: proto-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== API Server (Node.js) ====================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: proto-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/proto
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-dev-key}
      - JWT_EXPIRES_IN=7d
      - API_PORT=4000
      - AI_ENGINE_URL=http://ai:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== AI Engine (Python/FastAPI) ====================
  ai:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: proto-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ai-engine:/app
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_MODEL=${AI_MODEL:-gpt-4o}

  # ==================== Socket Server ====================
  socket:
    build:
      context: ./socket
      dockerfile: Dockerfile
    container_name: proto-socket
    restart: unless-stopped
    ports:
      - "4001:4001"
    volumes:
      - ./socket:/app
      - /app/node_modules
    environment:
      - REDIS_URL=redis://redis:6379
      - SOCKET_PORT=4001
      - JWT_SECRET=${JWT_SECRET:-super-secret-dev-key}
    depends_on:
      redis:
        condition: service_healthy

  # ==================== Frontend (Next.js) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proto-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:4001
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
