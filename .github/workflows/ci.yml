name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # Lint & Type Check
  # ============================================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # --- Frontend ---
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend TypeScript Check
        working-directory: frontend
        run: npx tsc --noEmit

      # --- API ---
      - name: Install API Dependencies
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: API TypeScript Check
        working-directory: api
        run: npx tsc --noEmit

      # --- Socket ---
      - name: Install Socket Dependencies
        working-directory: socket
        run: pnpm install --frozen-lockfile

      - name: Socket TypeScript Check
        working-directory: socket
        run: npx tsc --noEmit

  # ============================================
  # Backend Tests
  # ============================================
  test-api:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proto_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/proto_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Dependencies
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: api
        run: pnpm prisma generate

      - name: Push Database Schema
        working-directory: api
        run: pnpm prisma db push

      - name: Run Tests
        working-directory: api
        run: pnpm test -- --coverage

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage/

  # ============================================
  # Frontend Tests
  # ============================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        working-directory: frontend
        run: pnpm test -- --coverage

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ============================================
  # AI Engine Tests
  # ============================================
  test-ai-engine:
    name: AI Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-engine/requirements.txt

      - name: Install Dependencies
        working-directory: ai-engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run Tests
        working-directory: ai-engine
        run: pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-engine-coverage
          path: ai-engine/coverage.xml

  # ============================================
  # Build Verification
  # ============================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-api, test-frontend, test-ai-engine]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Frontend
        working-directory: frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_WS_URL: ws://localhost:4001

      - name: Install API
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: Build API
        working-directory: api
        run: pnpm build

  # ============================================
  # Docker Build
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Image
        run: docker build -t proto-api:test ./api

      - name: Build AI Engine Image
        run: docker build -t proto-ai:test ./ai-engine

      - name: Build Socket Image
        run: docker build -t proto-socket:test ./socket

      - name: Build Frontend Image
        run: docker build -t proto-frontend:test ./frontend
